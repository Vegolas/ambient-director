name: pages

# Deploys the promo landing page (site/, issue #157) to GitHub Pages at
# https://vegolas.github.io/ambient-director/. The site is plain static files —
# no build step, the checkout is uploaded as-is.
#
# One-time setup after the first merge: Settings → Pages → Source: "GitHub Actions"
# (or `gh api -X POST repos/Vegolas/ambient-director/pages -f build_type=workflow`).

on:
  push:
    branches: [main]
    paths: ['site/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel a deploy mid-flight; queued runs just wait their turn.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
