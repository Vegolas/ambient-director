name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref (saves Actions minutes on active branches).
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Building the API project also builds the referenced Blazor WASM UI.
      - name: Restore
        run: dotnet restore src/RpgSceneMaker.Api/RpgSceneMaker.Api.csproj

      - name: Build
        run: dotnet build src/RpgSceneMaker.Api/RpgSceneMaker.Api.csproj --configuration Release --no-restore
